<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PuraVibe</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- PAGE 1 -->
<section class="page page1 active" id="page1">
    <h1 class="ka-logo" onclick="goToPage2()">KA</h1>
</section>

<!-- PAGE 2 -->
<section class="page page2" id="page2">
    <div class="intro-card" onclick="goToPage3()">
        <h1>Welcome</h1>
        <p>Experience productivity like never before</p>
        <h2>Click to continue →</h2>
    </div>
</section>

<!-- PAGE 3 -->
<section class="page page3" id="page3">
    
    <div class="features">
        <h1>Alarm</h1>
        <h2>Task-Calendar</h2>
    </div>

    <!-- Crescent Clock -->
    <div class="clock-container">
        <svg viewBox="0 0 300 300">

            <path class="crescent" d="M150 40 A110 110 0 1 1 80 240" />
            <path class="crescent" d="M150 60 A90 90 0 1 1 95 220" />
            <path class="crescent" d="M150 80 A70 70 0 1 1 110 200" />

            <line id="hour" class="hand" x1="150" y1="150" x2="150" y2="90"/>
            <line id="minute" class="hand" x1="150" y1="150" x2="150" y2="70"/>
            <line id="second" class="hand second" x1="150" y1="150" x2="150" y2="60"/>

            <circle cx="150" cy="150" r="5" class="center-dot"/>
        </svg>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
